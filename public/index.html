                company_news: "Company News", company_news_list: ["Awarded National 'Little Giant'", "Passed IATF16949 recertification", "Annual supplier conference", "New HDI line launched"],
                industry_news: "Industry Trends", industry_news_list: ["5G+AI drives PCB", "EV boosts automotive PCB demand", "High-frequency materials seminar", "Global PCB market to exceed $100B by 2026"]
            },
            social_detail: { environment: "Environmental Protection", environment_desc: "Green manufacturing, RoHS/REACH, water reuse 60%, 30% solar, ISO14001, 35% carbon reduction by 2030." },
            contact_detail: { offices: "Service Locations", office_list: ["HQ: Building 3, Phase I, Quhe South Road, Suining", "Shenzhen Office: Nanshan District", "Suzhou Office: Suzhou Industrial Park"], message_title: "Online Message", name_placeholder: "Your Name", email_placeholder: "Email", msg_placeholder: "Message", submit: "Submit" }
        }
    };

    let currentLang = 'zh';
    function getUrlLang() { return new URLSearchParams(location.search).get('lang') === 'en' ? 'en' : 'zh'; }
    function t(key) { let val = langText[currentLang]; for(let k of key.split('.')) if(val?.[k] !== undefined) val = val[k]; else return key; return val; }

    const carouselMap = {
        about: ["https://picsum.photos/id/20/1600/500","https://picsum.photos/id/26/1600/500","https://picsum.photos/id/96/1600/500"],
        industry: ["https://picsum.photos/id/0/1600/500","https://picsum.photos/id/106/1600/500","https://picsum.photos/id/116/1600/500"],
        products: ["https://picsum.photos/id/91/1600/500","https://picsum.photos/id/38/1600/500","https://picsum.photos/id/42/1600/500"],
        news: ["https://picsum.photos/id/29/1600/500","https://picsum.photos/id/43/1600/500","https://picsum.photos/id/55/1600/500"],
        social: ["https://picsum.photos/id/144/1600/500","https://picsum.photos/id/13/1600/500"],
        contact: ["https://picsum.photos/id/15/1600/500","https://picsum.photos/id/89/1600/500"]
    };
    function renderCarousel(pageKey) {
        const images = carouselMap[pageKey] || carouselMap.about;
        let ind='', items='';
        const titles = currentLang==='zh'?['精密智造','创新驱动','全球服务']:['Precision','Innovation','Global'];
        images.forEach((img,i)=>{
            ind+=`<span class="${i===0?'active':''}" data-index="${i}"></span>`;
            items+=`<div class="carousel-item ${i===0?'active':''}" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('${img}');"><div class="carousel-caption"><h3>${titles[i%3]}</h3><p>${currentLang==='zh'?'领先PCB智造':'Advanced PCB Manufacturing'}</p></div></div>`;
        });
        return `<div class="carousel" id="pageCarousel"><div class="carousel-inner">${items}</div><div class="carousel-indicators">${ind}</div></div>`;
    }
    function initCarousel() {
        const carDiv = document.getElementById('pageCarousel');
        if(!carDiv) return;
        const items = carDiv.querySelectorAll('.carousel-item'), inds = carDiv.querySelectorAll('.carousel-indicators span');
        if(!items.length) return;
        let cur=0, interval;
        function goTo(idx){ items[cur].classList.remove('active'); inds[cur].classList.remove('active'); cur=idx; items[cur].classList.add('active'); inds[cur].classList.add('active'); }
        function start(){ if(interval) clearInterval(interval); interval = setInterval(()=>{ goTo((cur+1)%items.length); },4000); }
        inds.forEach((d,i)=>{ d.addEventListener('click',()=>{ clearInterval(interval); goTo(i); start(); }); });
        start();
    }

    function renderPageContent(page, sub) {
        let html = renderCarousel(page);
        if(page === 'about') {
            const d = t('about_detail');
            if(sub === 'intro') html += `<div class="container"><div class="sub-section"><h2>${d.intro}</h2><p>${d.intro_text}</p></div></div>`;
            else if(sub === 'capability') { const cap = d.capability_table; html += `<div class="container"><div class="sub-section"><h2>${d.capability}</h2><div class="table-wrapper"><table class="capability-table"><thead><tr>${cap.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${cap.rows.map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div></div>`; }
            else if(sub === 'management') html += `<div class="container"><div class="sub-section"><h2>${d.management}</h2><p>${d.management_text}</p></div></div>`;
            else if(sub === 'honor') html += `<div class="container"><div class="sub-section"><h2>${d.honor}</h2><ul>${d.honor_list.map(h=>`<li>${h}</li>`).join('')}</ul></div></div>`;
            else if(sub === 'structure') html += `<div class="container"><div class="sub-section"><h2>${d.structure}</h2><p>${d.structure_text}</p></div></div>`;
            else if(sub === 'quality') html += `<div class="container"><div class="sub-section"><h2>${d.quality}</h2><p>${d.quality_text}</p></div></div>`;
            else html += `<div class="container"><div class="home-form-large"><h3>${t('form_title')}</h3><p>${t('form_desc')}</p><form id="brochureForm"><input placeholder="${t('name_placeholder')}" required><input type="email" placeholder="${t('email_placeholder')}" required><input placeholder="${t('company_placeholder')}"><input placeholder="${t('phone_placeholder')}"><button type="submit">${t('submit')}</button></form></div></div>`;
        } 
        else if(page === 'industry') {
            const d = t('industry_detail');
            if(sub && d[sub]) html += `<div class="container"><div class="sub-section"><h2>${d[sub]}</h2><p>${d[sub+'_desc']}</p></div></div>`;
            else html += `<div class="container"><div class="sub-section"><h2>${t('nav_industry')}</h2><p>请选择具体市场</p></div></div>`;
        }
        else if(page === 'products') {
            const d = t('products_detail');
            if(sub === 'process_cap') { const pt = d.process_table; html+=`<div class="container"><div class="sub-section"><h2>${d.process_cap}</h2><div class="table-wrapper"><table class="capability-table"><thead><tr>${pt.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${pt.rows.map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div></div>`; }
            else if(sub === 'prod_device') html+=`<div class="container"><div class="sub-section"><h2>${d.prod_device}</h2><div class="grid-2col">${d.prod_list.map(dev=>`<div class="info-card"><i class="fas fa-microchip"></i> ${dev}</div>`).join('')}</div></div></div>`;
            else if(sub === 'test_device') html+=`<div class="container"><div class="sub-section"><h2>${d.test_device}</h2><div class="grid-2col">${d.test_list.map(dev=>`<div class="info-card"><i class="fas fa-chart-line"></i> ${dev}</div>`).join('')}</div></div></div>`;
            else if(sub && d[sub]) html+=`<div class="container"><div class="sub-section"><h2>${d[sub]}</h2><p>${d[sub+'_desc']}</p></div></div>`;
            else html+=`<div class="container"><div class="sub-section"><h2>${t('nav_products')}</h2><p>选择具体产品</p></div></div>`;
        }
        else if(page === 'news') {
            const d = t('news_detail');
            if(sub === 'company_news') html+=`<div class="container"><div class="sub-section"><h2>${d.company_news}</h2><ul>${d.company_news_list.map(i=>`<li>${i}</li>`).join('')}</ul></div></div>`;
            else if(sub === 'industry_news') html+=`<div class="container"><div class="sub-section"><h2>${d.industry_news}</h2><ul>${d.industry_news_list.map(i=>`<li>${i}</li>`).join('')}</ul></div></div>`;
            else html+=`<div class="container"><div class="sub-section"><h2>${d.company_news}</h2><ul>${d.company_news_list.map(i=>`<li>${i}</li>`).join('')}</ul></div><div class="sub-section"><h2>${d.industry_news}</h2><ul>${d.industry_news_list.map(i=>`<li>${i}</li>`).join('')}</ul></div></div>`;
        }
        else if(page === 'social') {
            html+=`<div class="container"><div class="sub-section"><h2>${t('social_detail.environment')}</h2><p>${t('social_detail.environment_desc')}</p></div></div>`;
        }
        else if(page === 'contact') {
            const d = t('contact_detail');
            if(sub === 'offices') html+=`<div class="container"><div class="sub-section"><h2>${d.offices}</h2><ul>${d.office_list.map(o=>`<li>${o}</li>`).join('')}</ul></div></div>`;
            else if(sub === 'message') html+=`<div class="container"><div class="sub-section"><h2>${d.message_title}</h2><form class="contact-form" id="msgForm"><input placeholder="${d.name_placeholder}" required><input type="email" placeholder="${d.email_placeholder}" required><textarea rows="4" placeholder="${d.msg_placeholder}" required></textarea><button type="submit">${d.submit}</button></form></div></div><script>document.getElementById('msgForm')?.addEventListener('submit',(e)=>{e.preventDefault(); alert('${currentLang==='zh'?'留言已发送，我们会尽快联系您。':'Message sent.'});})<\/script>`;
            else html+=`<div class="container"><div class="sub-section"><h2>${d.offices}</h2><ul>${d.office_list.map(o=>`<li>${o}</li>`).join('')}</ul></div><div class="sub-section"><h2>${d.message_title}</h2><form class="contact-form"><input placeholder="${d.name_placeholder}"><input placeholder="${d.email_placeholder}"><textarea rows="3"></textarea><button>${d.submit}</button></form></div></div>`;
        }
        return html;
    }

    function renderFull() {
        const urlParams = new URLSearchParams(location.search);
        const page = urlParams.get('page') || 'about';
        const sub = urlParams.get('sub') || null;
        document.getElementById('app').innerHTML = renderPageContent(page, sub);
        initCarousel();
        const brochureForm = document.getElementById('brochureForm');
        if(brochureForm) brochureForm.onsubmit = (e)=>{ e.preventDefault(); alert(t('thank_you')); brochureForm.reset(); };
        document.getElementById('socialStatement').innerHTML = `<h3>${t('statement_title')}</h3><p>${t('statement_content')}</p>`;
        document.getElementById('footerAddress').innerText = t('footer_address');
        buildFooterLinks();
        document.querySelectorAll('.nav-links > li > a').forEach(a => { if(a.getAttribute('data-page') === page) a.classList.add('active'); else a.classList.remove('active'); });
    }

    function buildNavLinks() {
        const pages = ['about','industry','products','news','social','contact'];
        const labels = [t('nav_about'), t('nav_industry'), t('nav_products'), t('nav_news'), t('nav_social'), t('nav_contact')];
        const subMap = {
            about: ['intro','capability','management','honor','structure','quality'],
            industry: ['network','auto','smart','medical','power','consumer'],
            products: ['std_pcb','hdi','high_layer','metal_base','process_cap','prod_device','test_device'],
            news: ['company_news','industry_news'],
            social: ['environment'],
            contact: ['offices','message']
        };
        let html = '';
        pages.forEach((p, idx) => {
            let subsHtml = `<div class="dropdown-menu">`;
            subMap[p].forEach(subKey => {
                let subLabel = '';
                if(p === 'about') subLabel = t(`about_detail.${subKey}`) || subKey;
                else if(p === 'industry') subLabel = t(`industry_detail.${subKey}`) || subKey;
                else if(p === 'products') subLabel = t(`products_detail.${subKey}`) || subKey;
                else if(p === 'news') subLabel = t(`news_detail.${subKey}`) || subKey;
                else if(p === 'social') subLabel = t(`social_detail.${subKey}`) || subKey;
                else subLabel = t(`contact_detail.${subKey}`) || subKey;
                subsHtml += `<a href="?page=${p}&sub=${subKey}&lang=${currentLang}">${subLabel}</a>`;
            });
            subsHtml += `</div>`;
            html += `<li class="dropdown"><a href="?page=${p}&lang=${currentLang}" data-page="${p}">${labels[idx]}</a>${subsHtml}</li>`;
        });
        html += `<li><button class="lang-btn" id="langToggle">${currentLang === 'zh' ? 'English' : '中文'}</button></li>`;
        document.getElementById('navLinks').innerHTML = html;
        document.getElementById('langToggle')?.addEventListener('click', ()=>{
            const newLang = currentLang === 'zh' ? 'en' : 'zh';
            const url = new URL(location.href);
            url.searchParams.set('lang', newLang);
            location.href = url.toString();
        });
    }
    function buildFooterLinks() {
        const groups = [
            { page:'about', subs:['intro','capability','management','honor','structure','quality'], labelsZh:['公司简介','制程能力','管理体系','荣誉','架构','品质'] },
            { page:'industry', subs:['network','auto','smart','medical','power','consumer'], labelsZh:['网络通信','汽车电子','智能终端','工控医疗','电源','消费电子'] },
            { page:'products', subs:['std_pcb','hdi','high_layer','metal_base','process_cap','prod_device','test_device'], labelsZh:['常规板','HDI','高多层','金属基','制程能力','生产设备','检测设备'] },
            { page:'news', subs:['company_news','industry_news'], labelsZh:['公司新闻','行业动态'] },
            { page:'social', subs:['environment'], labelsZh:['环境保护'] },
            { page:'contact', subs:['offices','message'], labelsZh:['服务据点','在线留言'] }
        ];
        let ftHtml = '';
        groups.forEach(g => {
            ftHtml += `<div class="footer-links-col"><h4>${t(`nav_${g.page}`)}</h4><ul>`;
            g.subs.forEach((sub, idx) => {
                let display = currentLang === 'zh' ? g.labelsZh[idx] : sub;
                ftHtml += `<li><a href="?page=${g.page}&sub=${sub}&lang=${currentLang}">${display}</a></li>`;
            });
            ftHtml += `</ul></div>`;
        });
        document.getElementById('footerLinksGrid').innerHTML = ftHtml;
    }

    function init() {
        currentLang = getUrlLang();
        buildNavLinks();
        renderFull();
        document.getElementById('menuToggle')?.addEventListener('click', () => document.getElementById('navLinks').classList.toggle('show'));
        document.getElementById('logoHome')?.addEventListener('click', (e) => { e.preventDefault(); location.href = `?lang=${currentLang}`; });
    }
    init();
    window.addEventListener('popstate', () => { currentLang = getUrlLang(); buildNavLinks(); renderFull(); });
</script>
</body>
</html>
