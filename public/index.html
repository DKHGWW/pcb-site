                cooperateDesc: "Facing trends of high density, high frequency, flexibility and intelligence, Kinming adheres to integrity, innovation, collaboration and win-win, providing customized solutions and full-cycle service.",
                inquiry: "Inquiry Now"
            }
        }
    };

    let currentLang = 'zh';  // 'zh' or 'en'

    // 获取当前语言文本
    function t(path) {
        const parts = path.split('.');
        let val = langData[currentLang];
        for (let p of parts) {
            if (val && val[p] !== undefined) val = val[p];
            else return path;
        }
        return val;
    }

    // 渲染各个页面（纯函数，根据语言重新生成HTML）
    function renderHome() {
        const d = t('home');
        const timelineArr = d.timeline;
        return `
            <section class="hero"><div class="container"><div class="hero-content"><div class="hero-text"><span class="hero-badge"><i class="fas fa-microchip"></i> ${d.heroBadge}</span><h2>${d.heroTitle}</h2><p>${d.heroDesc}</p><a href="#" data-page="products" class="btn-outline"><i class="fas fa-arrow-down"></i> ${currentLang === 'zh' ? '探索产品' : 'Explore Products'}</a></div><div style="background:#ffffffcc; border-radius:32px; padding:28px; flex:0.8;"><div style="display:flex; justify-content:space-between; margin-bottom:20px;"><div><strong>${d.years}</strong><br>${d.yearsLabel}</div><div><strong>${d.maxLayers}</strong><br>${d.maxLayersLabel}</div><div><strong>${d.aspectRatio}</strong><br>${d.aspectRatioLabel}</div></div><div style="font-size:0.9rem; color:#2d4a8c;">${d.subnote}</div></div></div></div></section>
            <section style="padding:60px 0;"><div class="container"><div class="section-title">${d.aboutTitle}</div><div style="background:white; border-radius:28px; padding:32px; margin-bottom:48px;"><p style="font-size:1.1rem; line-height:1.6; margin-bottom:20px;"><strong>${d.companyName}</strong> ${d.companyIntro}</p><p style="color:#2563eb;"><i class="fas fa-chart-line"></i> ${d.missionPrefix}${d.mission}</p></div><div class="section-title" style="margin-bottom:32px;">${d.timelineTitle}</div><div class="timeline">${timelineArr.map(t => `<div class="timeline-item"><div class="timeline-year">${t.year}</div><h4>${t.title}</h4><p>${t.desc}</p></div>`).join('')}</div></div></section>
        `;
    }

    function renderIndustry() {
        const d = t('industry');
        return `<div class="container"><div class="section-title">${d.title}</div><p style="text-align:center; margin-bottom:40px;">${d.subtitle}</p><div class="card-grid">${d.list.map(i => `<div class="card"><i class="${i.icon}" style="font-size:2rem; color:#2563eb;"></i><h3>${i.title}</h3><p>${i.desc}</p><div class="device-params">${i.param}</div></div>`).join('')}</div></div>`;
    }

    function renderProducts() {
        const d = t('products');
        return `<div class="container"><div class="section-title">${d.title}</div><div class="card-grid" style="margin-bottom:48px;">${d.items.map(p => `<div class="card"><h3><i class="fas fa-microchip"></i> ${p.title}</h3><p>${p.desc}</p></div>`).join('')}</div><div class="section-title" style="margin-bottom:30px;">${d.capTitle}</div><div class="table-wrapper"><table class="capability-table"><thead><tr>${d.tableHeaders.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${d.rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;
    }

    function renderSupply() {
        const d = t('supply');
        return `<div class="container"><div class="section-title">${d.title}</div><div class="card-grid" style="margin-bottom:48px;">${d.equipment.map(e => `<div class="card"><div class="device-icon"><i class="${e.icon}"></i></div><h3>${e.name}</h3><div class="device-params">${e.params}</div></div>`).join('')}</div><div style="background:white; border-radius:28px; padding:28px;"><h3 style="text-align:center; margin-bottom:24px;"><i class="fas fa-flask"></i> ${d.labTitle}</h3><div class="qc-badges">${d.instruments.map(i => `<span class="qc-badge">${i}</span>`).join('')}</div><p style="text-align:center; margin-top:24px;">${d.note}</p></div></div>`;
    }

    function renderNews() {
        const d = t('news');
        return `<div class="container"><div class="section-title">${d.title}</div>${d.list.map(n => `<div class="news-item"><div style="display:flex; justify-content:space-between;"><span><i class="far fa-calendar-alt"></i> ${n.date}</span><span style="color:#2563eb;">${n.category}</span></div><h3 style="margin:10px 0;">${n.title}</h3><p>${n.content}</p></div>`).join('')}</div>`;
    }

    function renderContact() {
        const d = t('contact');
        return `<div class="container"><div class="section-title">${d.title}</div><div class="contact-grid"><div class="contact-card"><i class="fas fa-map-marker-alt fa-2x" style="color:#2563eb;"></i><h3>${currentLang === 'zh' ? '生产基地' : 'Facility'}</h3><p>${d.address}</p></div><div class="contact-card"><i class="fas fa-phone-alt fa-2x" style="color:#2563eb;"></i><h3>${currentLang === 'zh' ? '业务咨询' : 'Contact'}</h3><p>${d.phone}<br>${d.fax}</p></div><div class="contact-card"><i class="fas fa-envelope fa-2x" style="color:#2563eb;"></i><h3>${currentLang === 'zh' ? '电子邮箱' : 'Email'}</h3><p>${d.email}<br>${d.supportEmail}</p></div></div><div style="background:white; border-radius:32px; padding:32px; margin-top:40px; text-align:center;"><i class="fas fa-handshake fa-2x" style="color:#2563eb;"></i><h3 style="margin:16px 0;">${d.cooperateTitle}</h3><p>${d.cooperateDesc}</p><a href="mailto:${d.email}" class="btn-outline"><i class="fas fa-paper-plane"></i> ${d.inquiry}</a></div></div>`;
    }

    async function loadPage(page) {
        let html = '';
        if (page === 'home') html = renderHome();
        else if (page === 'industry') html = renderIndustry();
        else if (page === 'products') html = renderProducts();
        else if (page === 'supply') html = renderSupply();
        else if (page === 'news') html = renderNews();
        else if (page === 'contact') html = renderContact();
        else html = renderHome();
        document.getElementById('app').innerHTML = `<div class="page-section active-page">${html}</div>`;
        // 重新绑定内部链接
        document.querySelectorAll('[data-page]').forEach(link => {
            link.addEventListener('click', (e) => { e.preventDefault(); const p = link.getAttribute('data-page'); if(p) setActivePage(p); });
        });
        // 更新导航栏文字（多语言）
        document.querySelectorAll('.nav-links a[data-page]').forEach(a => {
            const key = a.getAttribute('data-i18n');
            if (key) a.innerText = t(key);
        });
    }

    function setActivePage(page) {
        window.history.pushState({}, '', `#${page}`);
        loadPage(page);
        document.querySelectorAll('.nav-links a').forEach(a => {
            if(a.getAttribute('data-page') === page) a.classList.add('active');
            else a.classList.remove('active');
        });
    }

    // 切换语言
    function switchLanguage() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        const btn = document.getElementById('langToggle');
        btn.innerText = currentLang === 'zh' ? 'English' : '中文';
        // 重新加载当前页面
        const currentPage = window.location.hash.slice(1) || 'home';
        setActivePage(currentPage);
    }

    // 事件绑定
    document.querySelectorAll('.nav-links a[data-page]').forEach(link => {
        link.addEventListener('click', (e) => { e.preventDefault(); const p = link.getAttribute('data-page'); if(p) setActivePage(p); });
    });
    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('show');
    });
    document.getElementById('langToggle').addEventListener('click', switchLanguage);

    const initialPage = window.location.hash.slice(1) || 'home';
    setActivePage(initialPage);
</script>
</body>
</html>
